version: '3.8'

services:
  # Ansible MCP Server with stdio transport (default)
  ansible-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ansible-mcp-stdio
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    volumes:
      # Mount local ansible configuration and playbooks
      - ${ANSIBLE_CONFIG_DIR:-.}:/workspace
      - ${SSH_KEY_PATH:-.}:/home/ansible/.ssh:ro
    working_dir: /workspace
    # Remove the command for stdio mode (it's the default)
    stdin_open: true
    tty: true
    networks:
      - ansible-network

  # Ansible MCP Server with SSE transport (optional, for remote access)
  ansible-mcp-sse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ansible-mcp-sse
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      # Mount local ansible configuration and playbooks
      - ${ANSIBLE_CONFIG_DIR:-.}:/workspace
      - ${SSH_KEY_PATH:-.}:/home/ansible/.ssh:ro
    working_dir: /workspace
    command: python src/ansible_mcp/server.py --transport sse --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - ansible-network
    profiles:
      - sse

  # Ansible control node with dependencies (optional)
  ansible-control:
    image: python:3.10-slim
    container_name: ansible-control-node
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - ${ANSIBLE_CONFIG_DIR:-.}:/workspace
      - ${SSH_KEY_PATH:-.}:/root/.ssh:ro
    working_dir: /workspace
    command: /bin/bash
    stdin_open: true
    tty: true
    networks:
      - ansible-network
    profiles:
      - control
    depends_on:
      - ansible-mcp-stdio

networks:
  ansible-network:
    driver: bridge

volumes:
  # Define volume for persistent playbook/role storage (optional)
  ansible-workspace:
    driver: local
